name: Deploy Cloak of Darkness to GitHub Pages

# Builds the Cloak of Darkness sample with Lighthouse and publishes the web
# bundle to GitHub Pages. The bundle ships a service worker that synthesizes the
# cross-origin-isolation headers (COOP/COEP), so it runs on plain Pages with no
# server configuration. See devdocs/lighthouse.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build the web bundle
        run: node src/lighthouse/build.js sample/cloak.lamp dist/cloak --encode-strings

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/cloak

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
