<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <!-- interactive-widget: the virtual keyboard shrinks the layout viewport
         (Android Chrome 108+), keeping the transcript tail above it. iOS ignores
         this; shell.js compensates by tracking the visual viewport. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
    <title>Lamp Game</title>
    <link rel="stylesheet" href="./shell.css">
    <script>
        // Register the cross-origin-isolation service worker before the shell
        // runs. On first visit the page loads without the isolation headers (the
        // worker controls the page only after it activates), so reload once the
        // worker takes control; the reloaded page loads isolated and the shell's
        // SharedArrayBuffer succeeds. If already isolated, do nothing. See sw.js.
        (function () {
            if (window.crossOriginIsolated) return;
            if (!window.isSecureContext || !("serviceWorker" in navigator)) return;
            navigator.serviceWorker.addEventListener("controllerchange", function () {
                window.location.reload();
            });
            navigator.serviceWorker.register("./sw.js").then(function (registration) {
                if (registration.active && !navigator.serviceWorker.controller) {
                    window.location.reload();
                }
            }).catch(function () {
                // No service worker means no isolation; the shell shows a notice.
            });
        })();
    </script>
</head>
<body>
    <!-- Host shell: renders worker output as text nodes, captures one line of
         input at a time, and brokers it to the game worker. Contains no game
         logic. See devdocs/sandbox.md and devdocs/lighthouse.md. -->
    <main id="screen">
        <!-- Text-window pane containers (devdocs/text-windows.md): panes are built
             by shell.js on window_set and docked here; the traditional status
             line is a `look "bar"` top window (lib/advent/status.lamp). Empty
             containers collapse to nothing, so a game without windows renders
             exactly as before. The right/bottom containers run in reverse flex
             order so a lower priority is always nearer its screen edge. -->
        <div id="win-top"></div>
        <div id="main-row">
            <div id="win-left"></div>
            <!-- The input lives at the tail of the transcript; output is inserted
                 before it, so the input always sits inline right after the last
                 output (no separate bottom-pinned prompt). -->
            <div id="transcript" aria-live="polite"><input id="input-line" type="text"
                aria-label="Enter a command" autocomplete="off" autocapitalize="off"
                autocorrect="off" spellcheck="false" disabled></div>
            <div id="win-right"></div>
        </div>
        <div id="win-bottom"></div>
        <!-- "[more]" pager: shown when a turn's output overflows the transcript
             viewport. A flex row below the transcript (so it shrinks the scroll area
             rather than covering text); any key or a click reveals the next page. See
             devdocs/windows.md. -->
        <div id="more-bar" role="button" tabindex="0" aria-label="Show more output"
            hidden>[more]</div>
    </main>
    <!-- The service worker that synthesizes COOP/COEP is added in step (d). Until
         then the page is not cross-origin isolated and the shell shows a notice
         instead of constructing a SharedArrayBuffer. -->
    <script src="./shell.js"></script>
</body>
</html>
